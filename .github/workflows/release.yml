name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write 

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Build Project
      run: dotnet build MaskFixes.sln --configuration Release

    - name: Zip Build Files
      run: |
        cd MaskFixes/bin/Release/netstandard2.1/ 
        zip -r ../../../../MaskFixes.zip .

    - name: Generate Checksum
      run: sha256sum MaskFixes.zip > checksum_sha256.txt

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        files: |
          MaskFixes.zip
          checksum_sha256.txt
        generate_release_notes: true # Automatically lists PRs and commits
